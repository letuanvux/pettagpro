name: Flutter Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version

      - run: flutter pub get     

      - run: flutter build apk --release

      # ✅ set timezone VN (optional)
      - name: Set timezone
        run: sudo timedatectl set-timezone Asia/Ho_Chi_Minh

      # ✅ tạo timestamp
      - name: Set timestamp
        run: echo "TIME=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_ENV

      # ✅ debug (rất quan trọng)
      - name: Debug files
        run: ls -R build/app/outputs

      # ✅ copy + rename
      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/pet-tag-pro-${TIME}.apk

      # ✅ upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pet-tag-pro-${{ env.TIME }}
          path: build/app/outputs/flutter-apk/pet-tag-pro-${{ env.TIME }}.apk

      # ✅ release (fix tên file)
      - name: Release APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/app/outputs/flutter-apk/pet-tag-pro-${{ env.TIME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
